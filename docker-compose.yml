# Run: docker-compose --file docker-compose.yml up --detach
services:
  gabriel_guard:
    # image: <user>/gabriel_guard:<tag>
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - gabriel_guard_app:/app
      - gabriel_guard_logs:/app/logs
    ports:
      - 3000:3000
    env_file:
      - .env

  postgres:
    image: postgres:17.5
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432

  nginx:
    image: nginx:1.28
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  gabriel_guard_logs:
  gabriel_guard_app:
  postgres_data:
